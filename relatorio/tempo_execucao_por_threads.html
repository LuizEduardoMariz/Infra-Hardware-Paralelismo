
<div style="position: relative; width: 100%; height: 340px;">
  <canvas id="chartTempo" role="img" aria-label="Gráfico de barras do tempo médio de execução por número de threads, com barras de erro representando o intervalo de confiança de 95%. Valores em segundos: 1 thread 0.595s, 2 threads 0.397s, 3 threads 0.373s, 4 threads 0.352s (mínimo), 6 threads 0.362s, 8 threads 0.365s, 12 threads 0.411s.">Tempo médio de execução por número de threads: 1→0.595s, 2→0.397s, 3→0.373s, 4→0.352s (mínimo), 6→0.362s, 8→0.365s, 12→0.411s</canvas>
</div>
<div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary);">
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #378ADD;"></span>Tempo médio (s)</span>
  <span style="display: flex; align-items: center; gap: 4px;"><span style="width: 14px; height: 2px; background: #2C2C2A;"></span>IC 95%</span>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['1', '2', '3', '4', '6', '8', '12'];
const medias = [0.5949, 0.3973, 0.3728, 0.3522, 0.3624, 0.3646, 0.4105];
const icLow  = [0.5686, 0.3757, 0.3553, 0.3370, 0.3439, 0.3450, 0.3931];
const icHigh = [0.6213, 0.4189, 0.3903, 0.3675, 0.3808, 0.3843, 0.4279];

const errorBarsPlugin = {
  id: 'errorBars',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    const meta = chart.getDatasetMeta(0);
    ctx.save();
    ctx.strokeStyle = '#2C2C2A';
    ctx.lineWidth = 1.5;
    meta.data.forEach((bar, i) => {
      const x = bar.x;
      const yLow = chart.scales.y.getPixelForValue(icLow[i]);
      const yHigh = chart.scales.y.getPixelForValue(icHigh[i]);
      ctx.beginPath();
      ctx.moveTo(x, yLow);
      ctx.lineTo(x, yHigh);
      ctx.moveTo(x - 6, yLow);
      ctx.lineTo(x + 6, yLow);
      ctx.moveTo(x - 6, yHigh);
      ctx.lineTo(x + 6, yHigh);
      ctx.stroke();
    });
    ctx.restore();
  }
};

new Chart(document.getElementById('chartTempo'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [{
      label: 'Tempo médio (s)',
      data: medias,
      backgroundColor: '#85B7EB',
      borderColor: '#378ADD',
      borderWidth: 1,
      borderRadius: 4
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { display: false } },
    scales: {
      x: { title: { display: true, text: 'Número de threads (processos)' } },
      y: { title: { display: true, text: 'Tempo de execução (s)' }, beginAtZero: true }
    }
  },
  plugins: [errorBarsPlugin]
});
</script>
